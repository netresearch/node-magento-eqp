name: 🔎 Lint

on:
    workflow_dispatch:
    push:
        branches-ignore: [gh-pages]
    pull_request:
        branches-ignore: [gh-pages]
        types: [opened, synchronize]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    HUSKY: '0'

jobs:
    build:
        name: 🔨 Build
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: yarn

            - name: ⚡ Install dependencies
              run: yarn install --frozen-lockfile

            - name: 🔨 Build
              run: yarn build:lib

    test:
        name: 🧪 Test
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: yarn

            - name: ⚡ Install dependencies
              run: yarn install --frozen-lockfile

            - name: 🧪 Test
              run: yarn test:coverage

    lint:
        name: 🔎 Lint
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: yarn

            - name: ⚡ Install dependencies
              run: yarn install --frozen-lockfile

            - name: 🔎 Lint
              run: yarn lint
